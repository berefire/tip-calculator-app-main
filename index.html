<!DOCTYPE html>
<html lang="en" translate="no">

<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="author" content="Berefire">

  <meta name="description"
    content="Frontend Mentor challenge solution for the Tip Calculator App. Built with semantic HTML, modular CSS architecture, and vanilla JavaScript.">

  <link rel="icon" type="image/png" sizes="32x32" href="/tip-calculator-app-main/favicon-32x32.png">

  <title>Frontend Mentor | Tip calculator app</title>



  <script type="module" crossorigin src="/tip-calculator-app-main/assets/index-CLj2R9n5.js"></script>
  <link rel="stylesheet" crossorigin href="/tip-calculator-app-main/assets/index-Cu9TKtGE.css">
</head>

<body>
  <main class="cover">
    <h1 class="sr-only">Tip Calculator App</h1>
    <span class="icon box--icon" aria-hidden="true"></span>
    <section class="calculator box--calculator cluster--calculator" aria-labelledby="calculator-title">
      <h2 id="calculator-title" class="sr-only">
        Tip Calculator App
      </h2>

      <form class="calculator__form stack--form" novalidate>
        <div class="form-group">
          <div class="bill-error__wrapper">
            <label for="bill" class="bill__label">Bill</label>
            <span id="bill-error" class="error-message" aria-live="polite"></span>
          </div>
          
          <div class="bill__wrapper">
            <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='11'%20height='17'%3e%3cpath%20fill='%239EBBBD'%20d='M6.016%2016.328v-1.464c1.232-.08%202.22-.444%202.964-1.092.744-.648%201.116-1.508%201.116-2.58v-.144c0-.992-.348-1.772-1.044-2.34-.696-.568-1.708-.932-3.036-1.092V4.184c.56.144%201.012.4%201.356.768.344.368.516.816.516%201.344v.288h1.824v-.432c0-.448-.088-.876-.264-1.284a3.783%203.783%200%2000-.744-1.116A4.251%204.251%200%20007.54%202.9a5.324%205.324%200%2000-1.524-.492V.872H4.288V2.36a5.532%205.532%200%2000-1.416.324c-.448.168-.84.392-1.176.672-.336.28-.604.616-.804%201.008-.2.392-.3.844-.3%201.356v.144c0%20.96.316%201.708.948%202.244.632.536%201.548.884%202.748%201.044v3.912c-.704-.16-1.248-.472-1.632-.936-.384-.464-.576-1.08-.576-1.848v-.288H.256v.576c0%20.464.08.924.24%201.38.16.456.404.88.732%201.272.328.392.744.728%201.248%201.008s1.108.476%201.812.588v1.512h1.728zM4.288%207.424c-.688-.128-1.164-.332-1.428-.612-.264-.28-.396-.644-.396-1.092%200-.464.176-.832.528-1.104.352-.272.784-.448%201.296-.528v3.336zm1.728%205.712V9.344c.768.128%201.328.328%201.68.6.352.272.528.688.528%201.248%200%20.544-.196.984-.588%201.32-.392.336-.932.544-1.62.624z'/%3e%3c/svg%3e" alt="" class="bill__icon" aria-hidden="true">
            <input 
              class="bill__input" 
              type="number" 
              id="bill" 
              name="bill" 
              inputmode="decimal" 
              min="0.01" 
              placeholder="0.01" 
              required
              aria-describedby="bill-error"
              aria-invalid="false"/>
          </div>
        </div>

        <fieldset>
          <legend class="tip__label">Select Tip %</legend>
          <div class="group-buttons grid">
            <label class="tip-button">
              <input type="radio" name="tip" value="5" class="tip-button__input" />
              <span class="tip-button--visual">5%</span>
            </label>

            <label class="tip-button">
              <input type="radio" name="tip" value="10" class="tip-button__input" />
              <span class="tip-button--visual">10%</span>
            </label>

            <label class="tip-button">
              <input type="radio" name="tip" value="15" class="tip-button__input" />
              <span class="tip-button--visual">15%</span>
            </label>

            <label class="tip-button">
              <input type="radio" name="tip" value="25" class="tip-button__input" />
              <span class="tip-button--visual">25%</span>
            </label>

            <label class="tip-button">
              <input type="radio" name="tip" value="50" class="tip-button__input" />
              <span class="tip-button--visual">50%</span>
            </label>

            <label for="tip-custom" class="tip-custom__label sr-only">Custom Tip</label>
            <input type="number" class="tip-custom__input" name="tip-custom" id="tip-custom" inputmode="numeric"
              placeholder="Custom" min="0" max="100" aria-label="Custom tip percentage" />
          </div>
        </fieldset>

        <div class="form-group">
          <div class="people-error__wrapper">
            <label for="people" class="people__label">Number of People</label>
            <span id="people-error" class="error-message" role="alert" aria-live="assertive"></span>
          </div>
          
          <div class="people__wrapper">
            <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='13'%20height='16'%3e%3cpath%20fill='%239EBBBD'%20d='M9.573%207.729c.406%200%20.784.07%201.126.209.342.14.639.33.881.569.232.227.438.503.614.82a5.1%205.1%200%2001.407.949c.097.312.178.654.242%201.016.062.359.105.699.126%201.011.02.307.031.624.031.945%200%20.836-.259%201.512-.768%202.01-.504.492-1.17.742-1.98.742H2.748c-.81%200-1.477-.25-1.98-.742C.259%2014.76%200%2014.084%200%2013.248c0-.322.01-.64.032-.945.02-.312.063-.652.126-1.01.063-.363.144-.705.242-1.017.1-.323.238-.643.407-.948.176-.318.382-.594.613-.821.243-.238.54-.43.882-.57.342-.138.72-.208%201.125-.208.16%200%20.313.067.61.265.183.123.397.264.636.421.204.134.48.259.822.372.333.11.671.167%201.005.167a3.19%203.19%200%20001.006-.167c.341-.113.618-.238.822-.372l.636-.42c.296-.2.45-.266.61-.266zM6.598%200C7.63%200%208.522.38%209.252%201.129s1.1%201.666%201.1%202.724c0%201.06-.37%201.976-1.1%202.725-.73.75-1.623%201.13-2.654%201.13-1.03%200-1.924-.38-2.653-1.13-.73-.749-1.1-1.666-1.1-2.725%200-1.058.37-1.975%201.1-2.724C4.675.379%205.567%200%206.598%200z'/%3e%3c/svg%3e" alt="" class="people__icon" aria-hidden="true">
            <input 
            class="people__input" 
            type="number" 
            id="people" 
            name="people" 
            inputmode="numeric" 
            min="1" 
            placeholder="1" 
            required 
            aria-describedby="people-error"
            aria-invalid="false" />
          </div>

        </div>
        <button type="submit" class="visually-hidden">Submit form</button>
      </form>

      <section class="calculator__results box--tip-card cluster cluster--results">
        <h2 class="sr-only">Calculator Results</h2>
        <div class="results-display grid--display-results">
            <p class="amount__label" id="tip-label">
              Tip Amount <span class="person__label">/ person</span>
            </p>
            <output class="display-amount" id="tip-amount" name="tipAmount" aria-labelledby="tip-label">$0.00</output>

            <p class="total__label" id="total-label">
              Total <span class="person__label">/ person</span>
            </p>
            <output class="display-total" id="total" name="totalAmount" aria-labelledby="total-label">$0.00</output>
        </div>

        <button type="button" id="reset" class="reset-btn">
          Reset
        </button>

        <div id="results-announcer" aria-live="polite" aria-atomic="true" class="sr-only"></div>
      </section>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a class="link" href="https://www.frontendmentor.io?ref=challenge" target="_blank"
      rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">Frontend Mentor <span
        aria-hidden="true" class="external-icon">🔗</span></a>.
    Coded by <a class="link" target="_blank" rel="noopener noreferrer" aria-label="Author (opens in a new tab)"
      href="#">Berefire</a>.
  </footer>
</body>

</html>
